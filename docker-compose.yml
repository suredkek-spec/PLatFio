version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: platfio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: platfio
      POSTGRES_USER: platfio
      POSTGRES_PASSWORD: platfio
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: platfio-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: platfio-backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - apps/backend/.env.example
    ports:
      - '8080:8080'

volumes:
  postgres_data:
